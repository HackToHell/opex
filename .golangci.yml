version: "2"

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - revive

formatters:
  enable:
    - gofmt

issues:
  # Show all issues from a linter (default is 50)
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    # Allow unchecked errors in test files
    - path: _test\.go
      linters:
        - errcheck
