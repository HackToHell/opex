version: "3.8"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: opex-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native protocol
    volumes:
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./clickhouse/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: otel
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  opex:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        BUILD_DATE: "${BUILD_DATE:-}"
    container_name: opex-server
    ports:
      - "8080:8080"
    volumes:
      - ./config.docker.yaml:/etc/opex/config.yaml:ro
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/status/buildinfo"]
      interval: 5s
      timeout: 3s
      retries: 10

  grafana:
    image: grafana/grafana:latest
    container_name: opex-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      OPEX_URL: http://opex:8080
    depends_on:
      opex:
        condition: service_healthy

volumes:
  clickhouse_data:
  grafana_data:
