apiVersion: 1

datasources:
  - name: Opex (Tempo)
    type: tempo
    access: proxy
    # docker-compose: resolved via container name.
    # run-dev (opex on host): edit URL to http://host.docker.internal:8080 in Grafana UI.
    url: $OPEX_URL
    isDefault: true
    editable: true
    jsonData:
      tracesToLogs:
        datasourceUid: ""
      nodeGraph:
        enabled: true
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
      search:
        filters: []
      streamingEnabled: false
