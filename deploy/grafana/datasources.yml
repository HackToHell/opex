apiVersion: 1

datasources:
  - name: Opex (Tempo)
    type: tempo
    access: proxy
    # When running Opex on the host (make run-dev), use host.docker.internal.
    # docker-compose overrides this via OPEX_URL to http://opex:8080.
    url: ${OPEX_URL:-http://host.docker.internal:8080}
    isDefault: true
    editable: true
    jsonData:
      tracesToLogs:
        datasourceUid: ""
      nodeGraph:
        enabled: true
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
      search:
        filters: []
      streamingEnabled: false
